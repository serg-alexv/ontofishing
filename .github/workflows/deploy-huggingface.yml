name: Deploy Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-space:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_ID: timelions/ontofishing
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Stop if HF token is not configured
        if: ${{ env.HF_TOKEN == '' }}
        run: |
          echo "::warning::HF_TOKEN repository secret is missing; skipping Hugging Face Space deploy."

      - name: Set up Python
        if: ${{ env.HF_TOKEN != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face Hub client
        if: ${{ env.HF_TOKEN != '' }}
        run: python -m pip install --upgrade "huggingface_hub>=0.35"

      - name: Upload Space files
        if: ${{ env.HF_TOKEN != '' }}
        run: |
          python - <<'PY'
          import os

          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ["HF_SPACE_ID"]
          sha = os.environ.get("GITHUB_SHA", "")[:7]

          HfApi(token=token).upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              path_in_repo=".",
              commit_message=f"Deploy Ontofishing cockpit {sha}",
              delete_patterns=["*"],
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  ".codex/*",
                  ".pytest_cache/*",
                  ".venv/*",
                  "__pycache__/*",
                  "**/__pycache__/*",
                  "*.pyc",
                  "reports/*",
                  "data/grok_runs/*",
                  "data/semantic_runs/*",
                  "data/ranked_opportunities.csv",
                  "data/opportunities_raw.csv",
              ],
          )
          PY
